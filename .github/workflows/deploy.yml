name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/karaoke || git clone https://github.com/vsla/karaoke.git ~/karaoke
            cd ~/karaoke
            git pull origin master
            docker compose up -d --build --remove-orphans
